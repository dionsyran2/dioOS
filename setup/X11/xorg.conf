Section "ServerFlags"
    Option "AutoAddDevices" "false"
EndSection

Section "InputDevice"
    Identifier "Keyboard0"
    Driver     "evdev"
    Option     "Device" "/dev/input/event0"
    Option     "GrabDevice" "1"
EndSection

Section "InputDevice"
    Identifier "Mouse0"
    Driver     "evdev"
    Option     "Device" "/dev/input/event1"
    Option     "GrabDevice" "1" 
EndSection

Section "Device"
    Identifier "Card0"
    Driver     "fbdev"
    Option     "fbdev" "/dev/fb0"
    Option      "ShadowFB" "on"
    Option      "SWCursor" "on"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Card0"
    DefaultDepth 24
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen     "Screen0"
    InputDevice "Keyboard0" "CoreKeyboard"
    InputDevice "Mouse0" "CorePointer"
EndSection
